name = "streamripper-worker"
main = "index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "SR_USERS"
id      = "REPLACE_WITH_YOUR_KV_ID_1"

[[kv_namespaces]]
binding = "SR_EVENTS"
id      = "REPLACE_WITH_YOUR_KV_ID_2"

[[kv_namespaces]]
binding = "SR_ADS"
id      = "REPLACE_WITH_YOUR_KV_ID_3"

[vars]
ENVIRONMENT = "production"
