<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony - Bulk Downloader</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="/eel.js"></script>
</head>
<body>
    <div class="app-container">
        
        <aside class="sidebar">
            <div class="brand">
                <span class="logo">🎵</span>
                <h2>Symphony</h2>
            </div>
            <nav class="menu">
                <button class="menu-item active" onclick="switchTab('search-tab')">🔍 Discover</button>
                <button class="menu-item" onclick="switchTab('queue-tab')">📋 Active Queue</button>
                <div class="menu-section">My Music Folder</div>
                <div class="folder-tree">
                    <div class="folder-item">📁 Albums</div>
                    <div class="folder-item">📁 Playlists</div>
                    <div class="folder-item">📁 Artists</div>
                </div>
            </nav>
            <div class="sidebar-footer">
                <p>Target: <span>Windows Music</span></p>
            </div>
        </aside>

        <main class="main-content">
            
            <section id="search-tab" class="tab-content active">
                <header class="search-header">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Paste Album/Playlist link, or type Artist name..." onkeypress="handleSearchKeyPress(event)">
                        <button class="btn-primary" onclick="triggerSearch()">Search</button>
                    </div>
                </header>

                <div class="results-container">
                    <div class="section-title" id="resultsTitle">Search Results</div>
                    <div class="results-grid" id="searchResults">
                        <div class="empty-state">
                            <p>Search for an artist or paste a YouTube Music link above to start adding to your queue.</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="queue-tab" class="tab-content">
                <div class="queue-header">
                    <h2>Live Download Queue</h2>
                    <button class="btn-success" id="startBtn" onclick="startBatchDownload()">Start Downloading</button>
                </div>
                <div class="queue-list" id="queueList">
                    <div class="empty-state">No items in the queue yet.</div>
                </div>
            </section>

        </main>

        <section class="quick-monitor">
            <h3>Queue Overview</h3>
            <div class="stat-card">
                <span class="stat-label">Total Items</span>
                <span class="stat-value" id="queueCount">0</span>
            </div>
            <div class="status-box" id="globalStatus">
                <div class="status-dot idle"></div>
                <span id="statusText">System Idle</span>
            </div>
            <div class="progress-container" style="display: none;" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                </div>
                <span class="progress-text" id="progressText">0%</span>
            </div>
        </section>

    </div>

    <script>
        // Store your queue links/objects in memory
        let localQueue = [];

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function handleSearchKeyPress(event) {
            if (event.key === 'Enter') triggerSearch();
        }

        // Simulating the Python backend search connection for the UI
        async function triggerSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            document.getElementById('searchResults').innerHTML = '<div class="loading">Searching backend...</div>';
            
            // Call your Python backend search
            let results = await eel.search_backend(query)(); 
            renderResults(results);
        }

        function renderResults(results) {
            const grid = document.getElementById('searchResults');
            grid.innerHTML = '';

            if (!results || results.length === 0) {
                grid.innerHTML = '<div class="empty-state">No results found. Try a direct link!</div>';
                return;
            }

            results.forEach(item => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <img src="${item.thumbnail || 'https://via.placeholder.com/150'}" alt="Cover">
                    <div class="card-info">
                        <h4>${item.title}</h4>
                        <p>${item.artist}</p>
                        <span class="badge">${item.type}</span>
                    </div>
                    <button class="btn-card" onclick="addToQueue('${item.url}', '${item.title.replace(/'/g, "\\'")}')">Add to Queue</button>
                `;
                grid.appendChild(card);
            });
        }

        function addToQueue(url, title) {
            localQueue.push({ url, title });
            document.getElementById('queueCount').innerText = localQueue.length;
            
            // Update the main Queue Tab list view
            const qList = document.getElementById('queueList');
            if (localQueue.length === 1) qList.innerHTML = ''; // Clear empty state
            
            const qItem = document.createElement('div');
            qItem.className = 'queue-item';
            qItem.innerHTML = `<span>🎵 ${title}</span><button class="btn-danger-sm" onclick="removeFromQueue(this, '${url}')">✕</button>`;
            qList.appendChild(qItem);
        }

        async function startBatchDownload() {
            if (localQueue.length === 0) return;
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('globalStatus').querySelector('.status-dot').className = 'status-dot active';
            document.getElementById('statusText').innerText = "Downloading...";
            
            // Send the raw links array to Python back-end
            const linksArray = localQueue.map(item => item.url);
            let finalMsg = await eel.download_queue_from_ui(linksArray)();
            
            // Clear out on complete
            document.getElementById('globalStatus').querySelector('.status-dot').className = 'status-dot idle';
            document.getElementById('statusText').innerText = "Finished!";
            document.getElementById('queueList').innerHTML = '<div class="empty-state">No items in the queue yet.</div>';
            localQueue = [];
            document.getElementById('queueCount').innerText = "0";
            document.getElementById('startBtn').disabled = false;
        }
    </script>
</body>
</html>
