name: Build StreamRipper

on:
  push:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write

jobs:

  # ── WINDOWS EXE ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install -r requirements.txt
      - name: Download ffmpeg
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          New-Item -ItemType Directory -Force -Path assets
          $ff = Get-ChildItem -Recurse -Filter "ffmpeg.exe" ffmpeg_tmp | Select-Object -First 1
          Copy-Item $ff.FullName assets\ffmpeg.exe
          $fp = Get-ChildItem -Recurse -Filter "ffprobe.exe" ffmpeg_tmp | Select-Object -First 1
          Copy-Item $fp.FullName assets\ffprobe.exe
      - name: Create icon
        shell: powershell
        run: |
          python -c "
          from PIL import Image,ImageDraw
          img=Image.new('RGBA',(256,256),(9,11,16,255))
          ImageDraw.Draw(img).ellipse([40,40,216,216],fill=(0,229,255,255))
          img.save('assets/icon.ico',format='ICO',sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])
          "
      - run: pyinstaller streamripper.spec --clean --noconfirm
      - run: Move-Item dist\StreamRipper.exe dist\StreamRipper-Windows.exe
        shell: powershell
      - uses: actions/upload-artifact@v4
        with: { name: StreamRipper-Windows, path: dist/StreamRipper-Windows.exe }
      - if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with: { files: dist/StreamRipper-Windows.exe }

  # ── MACOS DMG ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install -r requirements.txt
      - run: brew install ffmpeg
      - name: Create icon
        run: |
          mkdir -p assets
          python3 -c "
          from PIL import Image,ImageDraw
          img=Image.new('RGBA',(1024,1024),(9,11,16,255))
          ImageDraw.Draw(img).ellipse([100,100,924,924],fill=(0,229,255,255))
          img.save('assets/icon.png')
          "
          mkdir -p assets/icon.iconset
          for s in 16 32 64 128 256 512 1024; do
            sips -z $s $s assets/icon.png --out assets/icon.iconset/icon_${s}x${s}.png
          done
          iconutil -c icns assets/icon.iconset -o assets/icon.icns
      - run: pyinstaller streamripper.spec --clean --noconfirm
      - name: Package DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "StreamRipper" --volicon "assets/icon.icns" \
            --window-size 600 400 --icon-size 100 \
            --icon "StreamRipper.app" 175 190 \
            --app-drop-link 425 190 \
            "dist/StreamRipper-macOS.dmg" "dist/StreamRipper.app" || \
          hdiutil create -volname StreamRipper -srcfolder dist/StreamRipper.app -ov -format UDZO dist/StreamRipper-macOS.dmg
      - uses: actions/upload-artifact@v4
        with: { name: StreamRipper-macOS, path: dist/StreamRipper-macOS.dmg }
      - if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with: { files: dist/StreamRipper-macOS.dmg }

  # ── LINUX APPIMAGE ──────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg fuse libfuse2 patchelf
      - run: pip install -r requirements.txt
      - name: Create icon
        run: |
          mkdir -p assets
          python3 -c "
          from PIL import Image,ImageDraw
          img=Image.new('RGBA',(256,256),(9,11,16,255))
          ImageDraw.Draw(img).ellipse([40,40,216,216],fill=(0,229,255,255))
          img.save('assets/icon.png')
          "
      - run: pyinstaller streamripper.spec --clean --noconfirm
      - name: Package AppImage
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/StreamRipper AppDir/usr/bin/streamripper
          cp assets/icon.png AppDir/streamripper.png
          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/streamripper.png
          cat > AppDir/streamripper.desktop << 'DESK'
          [Desktop Entry]
          Name=StreamRipper
          Exec=streamripper
          Icon=streamripper
          Type=Application
          Categories=Audio;Video;Network;
          DESK
          cp AppDir/streamripper.desktop AppDir/usr/share/applications/
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "$HERE/usr/bin/streamripper" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir dist/StreamRipper-Linux.AppImage
      - uses: actions/upload-artifact@v4
        with: { name: StreamRipper-Linux, path: dist/StreamRipper-Linux.AppImage }
      - if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with: { files: dist/StreamRipper-Linux.AppImage }

  # ── ANDROID APK ─────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "17", distribution: "temurin" }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: android/package-lock.json }
      - name: Install JS deps
        working-directory: android
        run: npm install
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Create keystore for signing
        run: |
          cd android/android/app
          keytool -genkeypair -v \
            -keystore streamripper.keystore \
            -alias streamripper \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass streamripper123 \
            -keypass  streamripper123 \
            -dname "CN=StreamRipper, OU=Dev, O=StreamRipper, L=NA, S=NA, C=US"
      - name: Build release APK
        working-directory: android
        env:
          MYAPP_UPLOAD_STORE_FILE: streamripper.keystore
          MYAPP_UPLOAD_STORE_PASSWORD: streamripper123
          MYAPP_UPLOAD_KEY_ALIAS: streamripper
          MYAPP_UPLOAD_KEY_PASSWORD: streamripper123
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Rename APK
        run: |
          mkdir -p dist
          find android/android/app/build -name "*.apk" -exec cp {} dist/StreamRipper-Android.apk \;
      - uses: actions/upload-artifact@v4
        with: { name: StreamRipper-Android, path: dist/StreamRipper-Android.apk }
      - if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with: { files: dist/StreamRipper-Android.apk }
